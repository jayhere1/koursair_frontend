version: "3.8"
services:
  app:
    build: .
    container_name: koursair_app
    restart: always
    volumes:
      - /app/node_modules
      - /etc/letsencrypt:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    environment:
      - NODE_ENV=production
    depends_on:
      - certbot
    networks:
      - webnet
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt/archive/koursair.com:/etc/ssl/certs:ro
      - ./certbot/www:/var/www/certbot
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    networks:
      - webnet

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 6h & wait $${!}; certbot renew; done'"
    networks:
      - webnet

networks:
  webnet:
    driver: bridge
